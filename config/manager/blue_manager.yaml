team_color: "blue"
# my_cars: ["robot_blue", "robot_blue2"]
my_cars: ["robot_blue"] #"robot_blue2" --- IGNORE ---
loop_hz: 1
state_timeout_s: 5.0
default_patrol_points:
  - [-0.5, 0.0]
  - [-1.0, -1.0]
  - [0.0, -1.2]
llm:
  enabled: false          # true 时调用 Kimi API；false 时使用规则引擎
  model: "moonshot-v1-8k" # 可选: moonshot-v1-8k / moonshot-v1-32k / moonshot-v1-128k
  api_key: ""             # 填入你的 Moonshot API Key（或通过 MOONSHOT_API_KEY 环境变量传入）
  timeout_s: 10