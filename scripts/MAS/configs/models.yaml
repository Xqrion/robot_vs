llm:
  provider: openai_compat
  base_url: "https://api.moonshot.cn/v1"
  api_key: ""
  endpoint: "/chat/completions"
  default_timeout_s: 30.0
  default_retries: 2
  default_backoff_s: 0.4
  max_concurrency: 8

leader_model:
  name: "kimi-k2.5"
  temperature: 1
  max_tokens: 512
  top_p: 0.95
  timeout_s: 30.0
  retries: 2
  backoff_s: 0.5

car_model:
  name: "kimi-k2-turbo-preview"
  temperature: 0.2
  max_tokens: 256
  top_p: 0.9
  timeout_s: 2.0
  retries: 1
  backoff_s: 0.3

runtime:
  leader_loop_interval_s: 10.0
  car_loop_interval_s: 3.0
  team_ports:
    red: 8001
    blue: 8002
